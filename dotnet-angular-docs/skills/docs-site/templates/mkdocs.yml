# Generated by docs-site. Nav between the docgen markers is regenerated;
# everything else is yours to edit.
site_name: "{Project name}"
site_description: "{One-line description}"

theme:
  name: material
  language: "{en|pl|...}"
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
  palette:
    - scheme: default
      toggle: { icon: material/brightness-7, name: Dark mode }
    - scheme: slate
      toggle: { icon: material/brightness-4, name: Light mode }

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

# Only when versioned publishing (mike) is used:
# extra:
#   version:
#     provider: mike

# docgen:begin:nav
nav:
  - Home: index.md
  - API:
      - api/index.md
  - Architecture:
      - architecture/c4-overview.md
# docgen:end:nav
