name: dotnet-angular-docs / validate

on:
  push:
    paths: ["dotnet-angular-docs/**", ".github/workflows/dotnet-angular-docs-*"]
  pull_request:
    paths: ["dotnet-angular-docs/**", ".github/workflows/dotnet-angular-docs-*"]

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Static plugin validation
        run: python dotnet-angular-docs/scripts/validate.py

      - name: Assertion parser selftest
        run: python dotnet-angular-docs/tests/run.py --selftest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Official plugin validator
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate ./dotnet-angular-docs
